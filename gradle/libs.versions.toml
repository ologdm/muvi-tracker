[versions]
agp = "9.0.1"
# fixme: store4 crasha, non compatibile con 'kotlin 2.3.10'; 'kotlin 1.9.10' non compatibile con 'agp 9.0.1'
kotlin = "2.3.10" # 1.9.10 - ultima compatibile con store 4
ksp = "2.3.4"
hilt = "2.59.2"

retrofit = "3.0.0"
okhttp = "5.3.2"
glide = "5.0.5"
coroutines = "1.10.2"
paging = "3.4.1"
room = "2.8.4"
material = "1.13.0"
appcompat = "1.7.1"
constraintlayout = "2.2.1"
corektx = "1.17.0"
swiperefreshlayout = "1.2.0"
fragmentktx = "1.8.9"
viewpager2 = "1.1.0"
mlkit_translate = "17.0.3"
flexbox = "3.0.0"
kotlin_serialization = "1.10.0"
retrofit_kotlin_serialization = "1.0.0"


[libraries]
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "appcompat" }
androidx-constraintlayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "constraintlayout" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "corektx" }
androidx-material = { module = "com.google.android.material:material", version.ref = "material" }
androidx-swiperefreshlayout = { module = "androidx.swiperefreshlayout:swiperefreshlayout", version.ref = "swiperefreshlayout" }
androidx-fragment-ktx = { module = "androidx.fragment:fragment-ktx", version.ref = "fragmentktx" }
androidx-viewpager2 = { module = "androidx.viewpager2:viewpager2", version.ref = "viewpager2" }

kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlin_serialization" }

retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-kotlinx-serialization = { module = "com.jakewharton.retrofit:retrofit2-kotlinx-serialization-converter", version.ref = "retrofit_kotlin_serialization" }
gson = { module = "com.google.code.gson:gson", version = "2.10.1" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }

glide = { module = "com.github.bumptech.glide:glide", version.ref = "glide" }
#glide-compiler = { module = "com.github.bumptech.glide:compiler", version.ref = "glide" }
glide-ksp = { module = "com.github.bumptech.glide:ksp", version.ref = "glide" }

hilt-android = { module = "com.google.dagger:hilt-android", version.ref = "hilt" }
hilt-compiler = { module = "com.google.dagger:hilt-compiler", version.ref = "hilt" }

coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }

paging-runtime-ktx = { module = "androidx.paging:paging-runtime-ktx", version.ref = "paging" }

room-ktx = { module = "androidx.room:room-ktx", version.ref = "room" }
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }

store4 = { module = "org.mobilenativefoundation.store:store4", version = "4.0.7" }

mlkit-translate = { module = "com.google.mlkit:translate", version.ref = "mlkit_translate" }

flexbox = { module = "com.google.android.flexbox:flexbox", version.ref = "flexbox" }

# test dependencies
junit = { module = "junit:junit", version = "4.13.2" }
androidx-test-junit = { module = "androidx.test.ext:junit", version = "1.1.5" }
androidx-test-espresso = { module = "androidx.test.espresso:espresso-core", version = "3.5.1" }



[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }

kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }

#kotlin-parcelize = { id = "org.jetbrains.kotlin.plugin.parcelize" } # non serve la version kotlin
kotlin-parcelize = { id = "org.jetbrains.kotlin.plugin.parcelize" } # non serve la version kotlin
#kotlin-kapt = { id = "org.jetbrains.kotlin.kapt" } # non serve piu con agp 9+; puoi tenerlo senza versione specifica (plugin integrato in Kotlin)

ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }

hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
